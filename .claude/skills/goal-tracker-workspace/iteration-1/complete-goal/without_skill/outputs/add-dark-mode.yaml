goal: Add Dark Mode to Dashboard
source: goal/initial-goal/add-dark-mode.md
completed_at: "2026-06-16T14:44:00Z"
summary: |
  Added a full dark mode toggle to the config dashboard. Defined CSS custom properties
  for light and dark color schemes, built a sun/moon toggle button in the header,
  implemented JavaScript-driven theme switching via a data-theme attribute on the
  document root, and persisted the user's preference to localStorage so it survives
  page reloads. Verified all dashboard views render correctly in both themes with no
  flicker on page load.
steps_completed:
  - Added CSS variables for dark theme colors — Defined light and dark color schemes using CSS custom properties in style.css
  - Created a toggle component — Built a sun/moon toggle button in the dashboard header in index.html
  - Wired up theme switching — Added JavaScript in theme.js to toggle a data-theme attribute on the document root
  - Persisted user preference — Saved the choice to localStorage and restored on page load in theme.js
  - Tested across all pages — Verified all dashboard views look correct in both themes
outcome: |
  The dashboard now supports both light and dark themes. A toggle button in the header
  allows users to switch instantly. The preference is saved to localStorage and
  automatically restored on subsequent visits, with no visible flicker during page
  load. All existing functionality and styling conventions remain intact. The
  implementation uses only vanilla JS and CSS — no build step required.
files_changed:
  - dashboard/static/style.css
  - dashboard/static/index.html
  - dashboard/static/theme.js
notes: |
  The implementation follows the project's "no build step" constraint (vanilla JS + CSS).
  Theme detection on initial load checks localStorage first, then falls back to the
  system prefers-color-scheme media query, defaulting to light if neither is set.
  No follow-up work needed.
