# ============================================
# Class Diagram Template (YAML)
# Visibility: + = public | - = private | # = protected
# ============================================

classes:
  - name: ClassName
    attributes:
      - visibility: "-"
        name: attribute1
        type: String
      - visibility: "-"
        name: attribute2
        type: int
      - visibility: "#"
        name: attribute3
        type: boolean

    methods:
      - visibility: "+"
        name: method1
        return_type: void
        parameters: []
      - visibility: "+"
        name: method2
        return_type: String
        parameters:
          - name: param1
            type: int
          - name: param2
            type: String
      - visibility: "#"
        name: method3
        return_type: boolean
        parameters:
          - name: input
            type: String

# ============================================
# Relationships between classes
# Types: inheritance | association | composition | dependency
# ============================================

relationships:
  - type: inheritance
    from: ChildClass
    to: ParentClass

  - type: association
    from: ClassA
    to: ClassB
    label: "uses"
    multiplicity:
      from: "1"
      to: "many"

  - type: composition
    from: House
    to: Room
    label: "contains"
    multiplicity:
      from: "1"
      to: "1..*"

  - type: dependency
    from: ClassX
    to: ClassY
    label: "depends on"