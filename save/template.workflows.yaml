workflows:
  default: understand-and-implement
  # --- Model resolution for ALL workflows ---
  # 1. If model_env is set AND the named env var is set, use its value as a model ID from the models registry.
  # 2. Otherwise, fall back to model_tier (high / middle / low), resolved via default_model_high/middle/low.
  # This lets you switch a workflow's model per deployment without touching YAML:
  #   export WORKFLOW_UNDERSTAND_IMPLEMENT_MODEL=deepseek-v4-pro
  registry:
    - id: understand-and-implement
      description: Understand codebase then implement a feature — the standard multi-phase workflow
      model_tier: middle
      model_env: WORKFLOW_UNDERSTAND_IMPLEMENT_MODEL
      phases:
        - title: Understand
          detail: Parallel readers explore relevant subsystems and produce a structured map
        - title: Design
          detail: Judge panel of independent approaches scored and synthesized
        - title: Implement
          detail: Apply changes with isolation, one agent per file group
        - title: Review
          detail: Adversarial review across correctness, security, and performance dimensions
      rules:
        require_approval_before_implement: true
        max_parallel_agents: 8
        timeout_per_phase_seconds: 600
      use_cases:
        - new feature development
        - significant refactoring
        - architecture changes

    - id: code-review-pipeline
      description: Multi-dimensional code review with adversarial verification
      model_tier: middle
      model_env: WORKFLOW_CODE_REVIEW_MODEL
      phases:
        - title: Review
          detail: Fan out across bugs, perf, security, and simplification dimensions
        - title: Verify
          detail: Adversarially verify each finding with independent skeptics
      rules:
        require_approval_before_implement: false
        max_parallel_agents: 12
        timeout_per_phase_seconds: 300
      use_cases:
        - PR review
        - pre-merge checks
        - quality gates

    - id: deep-research
      description: Fan-out web search, fetch sources, adversarially verify, synthesize cited report
      model_tier: high
      model_env: WORKFLOW_DEEP_RESEARCH_MODEL
      phases:
        - title: Search
          detail: Multi-source web sweep across search engines and APIs
        - title: Fetch
          detail: Deep-read top sources in parallel
        - title: Verify
          detail: Cross-reference claims, flag contradictions
        - title: Synthesize
          detail: Compose cited report with confidence scores
      rules:
        require_approval_before_implement: false
        max_parallel_agents: 10
        timeout_per_phase_seconds: 900
      use_cases:
        - technology evaluation
        - competitive analysis
        - literature review
        - market research

    - id: migrate-codebase
      description: Discover all migration sites, transform each in isolation, then verify
      model_tier: middle
      model_env: WORKFLOW_MIGRATE_CODEBASE_MODEL
      phases:
        - title: Discover
          detail: Sweep codebase for all affected call sites and patterns
        - title: Transform
          detail: One agent per file group in isolated worktrees
        - title: Verify
          detail: Run tests, check for regressions, validate consistency
      rules:
        require_approval_before_implement: true
        max_parallel_agents: 16
        timeout_per_phase_seconds: 1200
      use_cases:
        - framework version bumps
        - API signature changes
        - package renames
        - config format migrations

    - id: test-coverage-sweep
      description: Discover uncovered paths and generate tests for them
      model_tier: middle
      model_env: WORKFLOW_TEST_COVERAGE_MODEL
      phases:
        - title: Analyze
          detail: Profile coverage gaps and rank by criticality
        - title: Generate
          detail: Parallel test generation per uncovered module
        - title: Verify
          detail: Run generated tests, check they pass and cover intended paths
      rules:
        require_approval_before_implement: false
        max_parallel_agents: 8
        timeout_per_phase_seconds: 600
      use_cases:
        - coverage improvement
        - regression test backfill
        - new module test creation

    - id: bug-triage
      description: Reproduce, isolate, fix, and verify a bug report end-to-end
      model_tier: high
      model_env: WORKFLOW_BUG_TRIAGE_MODEL
      phases:
        - title: Reproduce
          detail: Attempt to trigger the bug with multiple approaches
        - title: Isolate
          detail: Binary-search through code to find root cause
        - title: Fix
          detail: Generate candidate fixes, each verified independently
        - title: Regression Check
          detail: Run full test suite, check no new failures introduced
      rules:
        require_approval_before_implement: false
        max_parallel_agents: 6
        timeout_per_phase_seconds: 900
      use_cases:
        - critical bug fixes
        - hard-to-reproduce issues
        - regression fixes

    - id: documentation-sweep
      description: Audit and generate documentation across the entire codebase
      model_tier: low
      model_env: WORKFLOW_DOCUMENTATION_SWEEP_MODEL
      phases:
        - title: Audit
          detail: Identify missing, stale, or inaccurate docs
        - title: Generate
          detail: Parallel doc generation per module or section
        - title: Review
          detail: Cross-check generated docs against source for accuracy
      rules:
        require_approval_before_implement: false
        max_parallel_agents: 10
        timeout_per_phase_seconds: 600
      use_cases:
        - API doc generation
        - README updates
        - architecture diagram generation

    - id: security-audit
      description: Comprehensive security review with adversarial verification
      model_tier: high
      model_env: WORKFLOW_SECURITY_AUDIT_MODEL
      phases:
        - title: Scan
          detail: Multi-lens sweep — injection, auth, crypto, data exposure, dependencies
        - title: Verify
          detail: Adversarial panel tries to confirm or refute each finding
        - title: Report
          detail: Synthesize findings with severity, CWE references, and fix suggestions
      rules:
        require_approval_before_implement: false
        max_parallel_agents: 12
        timeout_per_phase_seconds: 1200
      use_cases:
        - security review
        - compliance checks
        - dependency vulnerability audit
