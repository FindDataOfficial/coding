models:
  default: middle
  default_model_high: claude-opus-4-8
  default_model_middle: claude-sonnet-4-6
  default_model_low: claude-haiku-4-5
  providers:
    anthropic:
      api_key_env: ANTHROPIC_API_KEY
      base_url: https://api.anthropic.com
    volcengine:
      api_key_env: VOLCENGINE_API_KEY
      base_url: https://ark.cn-beijing.volces.com/api/coding
  registry:
  - id: high
    provider: anthropic
    name: claude-opus-4-8
    max_tokens: 8192
    temperature: 0.5
  - id: middle
    provider: anthropic
    name: claude-sonnet-4-6
    max_tokens: 4096
    temperature: 0.7
  - id: low
    provider: anthropic
    name: claude-haiku-4-5
    max_tokens: 2048
    temperature: 0.9
  - id: deepseek-v4-pro
    provider: volcengine
    name: deepseek-v4-pro
    max_tokens: 8192
    temperature: 0.7
  - id: deepseek-v4-flash
    provider: volcengine
    name: deepseek-v4-flash
    max_tokens: 4096
    temperature: 0.9
databases:
  default: sqlite-dev
  registry:
  - id: sqlite-dev
    driver: sqlite
    url: sqlite:///data/dev.db
    pool:
      min_size: 1
      max_size: 5
      timeout_seconds: 30
    auto_migrate: true
  - id: sqlite-test
    driver: sqlite
    url: sqlite:///data/test.db
    pool:
      min_size: 1
      max_size: 3
      timeout_seconds: 15
    auto_migrate: true
  - id: postgres-staging
    driver: postgresql
    url: postgresql://user:pass@localhost:5432/skills_staging
    pool:
      min_size: 2
      max_size: 10
      timeout_seconds: 30
    ssl_mode: require
    auto_migrate: true
  - id: postgres-prod
    driver: postgresql
    url_env: DATABASE_URL
    pool:
      min_size: 5
      max_size: 50
      timeout_seconds: 60
    ssl_mode: require
    auto_migrate: false
  - id: mysql-dev
    driver: mysql
    url: mysql+pymysql://root@localhost:3306/skills_dev
    pool:
      min_size: 2
      max_size: 10
      timeout_seconds: 30
    auto_migrate: true
  - id: mongo-dev
    driver: mongodb
    url: mongodb://localhost:27017/skills_dev
    pool:
      min_size: 2
      max_size: 20
      timeout_seconds: 30
logging:
  level: info
  format: json
  output: stderr
runtime:
  workers: 4
  request_timeout: 60
  shutdown_timeout: 30

# =============================================================================
# Per-agent / per-workflow model overrides (optional)
# Set any of these env vars to override the model used by a specific agent or
# workflow.  The value must match an `id` in models.registry above.
#
# When set, the env var takes priority over the agent/workflow's model_tier.
# When unset, the model_tier fallback (high/middle/low) is used.
# =============================================================================
#
# Agent model overrides:
#   export AGENT_GENERAL_PURPOSE_MODEL=deepseek-v4-pro
#   export AGENT_EXPLORE_MODEL=deepseek-v4-flash
#   export AGENT_PLAN_MODEL=claude-opus-4-8
#   export AGENT_CODE_REVIEWER_MODEL=claude-sonnet-4-6
#   export AGENT_TEST_WRITER_MODEL=deepseek-v4-pro
#   export AGENT_BUG_HUNTER_MODEL=claude-opus-4-8
#   export AGENT_DOC_WRITER_MODEL=deepseek-v4-flash
#   export AGENT_MIGRATOR_MODEL=deepseek-v4-pro
#
# Workflow model overrides:
#   export WORKFLOW_UNDERSTAND_IMPLEMENT_MODEL=claude-opus-4-8
#   export WORKFLOW_CODE_REVIEW_MODEL=claude-sonnet-4-6
#   export WORKFLOW_DEEP_RESEARCH_MODEL=claude-opus-4-8
#   export WORKFLOW_MIGRATE_CODEBASE_MODEL=deepseek-v4-pro
#   export WORKFLOW_TEST_COVERAGE_MODEL=deepseek-v4-flash
#   export WORKFLOW_BUG_TRIAGE_MODEL=claude-opus-4-8
#   export WORKFLOW_DOCUMENTATION_SWEEP_MODEL=deepseek-v4-flash
#   export WORKFLOW_SECURITY_AUDIT_MODEL=claude-opus-4-8
