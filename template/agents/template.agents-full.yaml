agents:
  default: general-purpose
  # --- Model resolution for ALL agents ---
  # 1. If model_env is set AND the named env var is set, use its value as a model ID from the models registry.
  # 2. Otherwise, fall back to model_tier (high / middle / low), resolved via default_model_high/middle/low.
  # This lets you switch an agent's model per deployment without touching YAML:
  #   export AGENT_GENERAL_PURPOSE_MODEL=deepseek-v4-pro
  registry:
    - id: general-purpose
      description: Catch-all agent for any task that doesn't fit a more specific type
      model_tier: middle
      model_env: AGENT_GENERAL_PURPOSE_MODEL
      tools:
        - Read
        - Write
        - Edit
        - Bash
        - Glob
        - Grep
        - WebSearch
        - WebFetch
      rules:
        max_turns: 20
        timeout_seconds: 300
        allow_parallel: true
      use_cases:
        - general research
        - multi-step coding tasks
        - file operations

    - id: explore
      description: Read-only search agent for broad fan-out searches across many files
      model_tier: low
      model_env: AGENT_EXPLORE_MODEL
      tools:
        - Read
        - Glob
        - Grep
        - Bash
        - WebSearch
        - WebFetch
      rules:
        max_turns: 10
        timeout_seconds: 120
        allow_parallel: true
        read_only: true
      use_cases:
        - sweeping many files
        - discovering naming conventions
        - locating code patterns

    - id: plan
      description: Software architect agent for designing implementation plans
      model_tier: high
      model_env: AGENT_PLAN_MODEL
      tools:
        - Read
        - Glob
        - Grep
        - Bash
        - WebSearch
        - WebFetch
      rules:
        max_turns: 15
        timeout_seconds: 300
        allow_parallel: false
        read_only: true
      use_cases:
        - architecture design
        - implementation planning
        - trade-off analysis

    - id: code-reviewer
      description: Review code changes for bugs, simplifications, and efficiency improvements
      model_tier: middle
      model_env: AGENT_CODE_REVIEWER_MODEL
      tools:
        - Read
        - Glob
        - Grep
        - Bash
      rules:
        max_turns: 10
        timeout_seconds: 180
        allow_parallel: false
        read_only: true
      use_cases:
        - PR review
        - diff analysis
        - correctness checks
        - refactoring suggestions

    - id: test-writer
      description: Generate and improve test suites for existing code
      model_tier: middle
      model_env: AGENT_TEST_WRITER_MODEL
      tools:
        - Read
        - Write
        - Edit
        - Bash
        - Glob
        - Grep
      rules:
        max_turns: 15
        timeout_seconds: 300
        allow_parallel: false
      use_cases:
        - unit test generation
        - integration test creation
        - test coverage improvement
        - test refactoring

    - id: bug-hunter
      description: Deep-dive debugging agent for complex, hard-to-reproduce issues
      model_tier: high
      model_env: AGENT_BUG_HUNTER_MODEL
      tools:
        - Read
        - Bash
        - Glob
        - Grep
        - WebSearch
        - WebFetch
      rules:
        max_turns: 25
        timeout_seconds: 600
        allow_parallel: false
      use_cases:
        - complex debugging
        - root cause analysis
        - stack trace investigation
        - regression hunting

    - id: doc-writer
      description: Generate and maintain documentation from codebase analysis
      model_tier: low
      model_env: AGENT_DOC_WRITER_MODEL
      tools:
        - Read
        - Write
        - Edit
        - Glob
        - Grep
      rules:
        max_turns: 12
        timeout_seconds: 180
        allow_parallel: false
        read_only: false
      use_cases:
        - README generation
        - API documentation
        - inline docstrings
        - architecture docs

    - id: migrator
      description: Handle large-scale code migrations across many files
      model_tier: middle
      model_env: AGENT_MIGRATOR_MODEL
      tools:
        - Read
        - Write
        - Edit
        - Bash
        - Glob
        - Grep
      rules:
        max_turns: 30
        timeout_seconds: 600
        allow_parallel: true
      use_cases:
        - framework upgrades
        - API migrations
        - monorepo refactoring
        - dependency updates
